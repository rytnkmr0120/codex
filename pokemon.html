<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéAPI Demo | Web App Layout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background-color: #f6f8fa;
      }

      .app-navbar {
        border-bottom: 1px solid #d0d7de;
      }

      .app-sidebar {
        min-height: calc(100vh - 56px);
        border-right: 1px solid #d0d7de;
        background-color: #ffffff;
      }

      .app-content {
        min-height: calc(100vh - 56px);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body app-navbar sticky-top">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">My Web App</span>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <aside class="col-12 col-md-3 col-lg-2 p-0 app-sidebar">
          <div class="list-group list-group-flush">
            <a href="index.html" class="list-group-item list-group-item-action">Dashboard</a>
            <a href="repositories.html" class="list-group-item list-group-item-action">Repositories</a>
            <a href="issues.html" class="list-group-item list-group-item-action">Issues</a>
            <a href="pull-requests.html" class="list-group-item list-group-item-action">Pull Requests</a>
            <a href="settings.html" class="list-group-item list-group-item-action">Settings</a>
            <a href="pokemon.html" class="list-group-item list-group-item-action active" aria-current="page">PokéAPI Demo</a>
          </div>
        </aside>

        <main class="col-12 col-md-9 col-lg-10 p-4 app-content">
          <h2 class="h4">PokéAPI Demo</h2>
          <p class="text-body-secondary mb-3">PokeAPIから取得したポケモンデータを表示します。</p>

          <div class="d-flex gap-2 mb-3">
            <button id="reload-btn" class="btn btn-sm btn-primary" type="button">再読み込み</button>
            <span id="status" class="text-body-secondary">読み込み中...</span>
          </div>
          <div id="pokemon-list" class="row g-3"></div>
          <div class="alert alert-info mb-0" role="alert">
            メニューをクリックすると、対応ページへ遷移し、選択中のメニューがハイライト表示されます。
          </div>
        </main>
      </div>
    </div>
    <script src="pokemon.js"></script>
  </body>
</html>
